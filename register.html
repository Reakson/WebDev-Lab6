<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-10">
  <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-2xl">
    <div class="flex justify-between items-center mb-6">
      <h2 id="welcome" class="text-xl font-semibold"></h2>
      <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
    </div>

    <h3 class="text-lg font-bold mb-4">Register User</h3>
    <form onsubmit="registerUser(event)" class="space-y-4 mb-6">
      <div>
        <label class="block text-gray-700">Full Name</label>
        <input type="text" id="fullName" required
          class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400">
      </div>
      <div>
        <label class="block text-gray-700">Email</label>
        <input type="email" id="email" required
          class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400">
      </div>
      <div>
        <label class="block text-gray-700">Phone</label>
        <input type="text" id="phone" required
          class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:border-blue-400">
      </div>
      <div class="flex space-x-4">
        <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Register</button>
        <button type="button" onclick="clearForm()" class="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Clear</button>
      </div>
    </form>

    <h3 class="text-lg font-bold mb-4">Registered Users</h3>
    <table class="table-auto w-full border-collapse border border-gray-300" id="userTable">
      <tr class="bg-gray-200">
        <th class="border px-4 py-2">Full Name</th>
        <th class="border px-4 py-2">Email</th>
        <th class="border px-4 py-2">Phone</th>
        <th class="border px-4 py-2">Action</th>
      </tr>
    </table>
  </div>

  <script>
    function getCookie(name) {
      let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    window.onload = function() {
      let username = getCookie("username");
      if (!username) {
        window.location.href = "login.html";
      } else {
        document.getElementById("welcome").innerText = "Welcome, " + username;
        displayUsers();
      }
    };

    function registerUser(event) {
      event.preventDefault();
      let fullName = document.getElementById("fullName").value;
      let email = document.getElementById("email").value;
      let phone = document.getElementById("phone").value;

      let newUser = { fullName, email, phone };

      let users = JSON.parse(localStorage.getItem("users")) || [];
      users.push(newUser);
      localStorage.setItem("users", JSON.stringify(users));

      displayUsers();
      clearForm();
    }

    function displayUsers() {
      let users = JSON.parse(localStorage.getItem("users")) || [];
      let table = document.getElementById("userTable");
      table.innerHTML = `
        <tr class="bg-gray-200">
          <th class="border px-4 py-2">Full Name</th>
          <th class="border px-4 py-2">Email</th>
          <th class="border px-4 py-2">Phone</th>
          <th class="border px-4 py-2">Action</th>
        </tr>
      `;
      users.forEach((user, index) => {
        table.innerHTML += `
          <tr>
            <td class="border px-4 py-2">${user.fullName}</td>
            <td class="border px-4 py-2">${user.email}</td>
            <td class="border px-4 py-2">${user.phone}</td>
            <td class="border px-4 py-2">
              <button onclick="deleteUser(${index})" class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    function deleteUser(index) {
      let users = JSON.parse(localStorage.getItem("users")) || [];
      users.splice(index, 1);
      localStorage.setItem("users", JSON.stringify(users));
      displayUsers();
    }

    function clearForm() {
      document.getElementById("fullName").value = "";
      document.getElementById("email").value = "";
      document.getElementById("phone").value = "";
    }

    function logout() {
      document.cookie = "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
